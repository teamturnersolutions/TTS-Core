# Firebase App Hosting Configuration File
# https://firebase.google.com/docs/app-hosting/configure

# Configuration for the backing Cloud Run service
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables
env:
  - variable: VITE_ENVIRONMENT
    value: production
